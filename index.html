<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ErgoNOM v2 · NOM-036-STPS-2018 · Teleflex</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<style>
    /* Estilos base (Mantenidos de tu original) */
    :root {
        --tf-blue: #005B9A; --bg: #F0F4F8; --surface: #FFFFFF;
        --accent: #005B9A; --risk-low: #16A34A; --risk-med: #D97706; --risk-high: #DC2626;
        --font-ui: 'Inter', sans-serif; --font-data: 'Space Mono', monospace;
        --r-md: 10px; --r-lg: 14px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font-ui); background: var(--bg); color: #1A2332; }
    
    /* Layout */
    .app-shell { display: grid; grid-template-columns: 220px 1fr; grid-template-rows: 60px 1fr; min-height: 100vh; }
    .topbar { grid-column: 1 / -1; background: var(--tf-blue); color: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; }
    .sidebar { background: #fff; border-right: 1px solid #DDE3EA; padding: 20px 0; }
    .nav-item { padding: 12px 20px; cursor: pointer; font-size: 14px; transition: 0.2s; border-left: 4px solid transparent; }
    .nav-item.active { background: #E8F4FF; color: var(--tf-blue); border-left-color: var(--tf-blue); font-weight: 600; }
    
    /* Pages */
    .page { display: none; padding: 30px; }
    .page.active { display: block; }
    .card { background: #fff; border: 1px solid #DDE3EA; border-radius: var(--r-lg); padding: 20px; margin-bottom: 20px; }
    
    /* Video & Canvas Area */
    .canvas-box { position: relative; background: #000; border-radius: 12px; overflow: hidden; max-width: 800px; }
    #videoEl { width: 100%; display: block; }
    #poseCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; cursor: crosshair; }
    
    /* Botones y Form */
    .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; }
    .btn-primary { background: var(--tf-blue); color: #fff; }
    textarea, input { width: 100%; padding: 10px; border: 1px solid #C8D3DE; border-radius: 8px; margin-top: 5px; }
</style>
</head>
<body>

<div class="app-shell">
    <header class="topbar">
        <div class="logo">TELEFLEX <strong>Ergonomía</strong></div>
        <div id="sync-status">Sincronizado Local</div>
    </header>

    <nav class="sidebar">
        <div class="nav-item active" onclick="goPage('dashboard')">📊 Dashboard</div>
        <div class="nav-item" onclick="goPage('describe')">🧠 Describir + IA</div>
        <div class="nav-item" onclick="goPage('video')">🎬 Análisis Video</div>
        <div class="nav-item" onclick="goPage('calc')">📐 Calculadora</div>
    </nav>

    <main class="content">
        <section id="page-dashboard" class="page active">
            <h2>Dashboard</h2>
            <div class="card">Resumen de evaluaciones registradas.</div>
        </section>

        <section id="page-describe" class="page">
            <h2>Descripción con IA</h2>
            <div class="card">
                <textarea id="desc-task" placeholder="Describe la tarea..."></textarea>
                <input type="password" id="api-key-input" placeholder="Anthropic API Key" oninput="saveApiKey(this.value)">
                <button class="btn btn-primary" onclick="analyzeWithAI()">Analizar con IA</button>
            </div>
        </section>

        <section id="page-video" class="page">
            <h2>Análisis de Video</h2>
            <div class="card">
                <input type="file" id="videoInput" accept="video/*" onchange="loadVideo(event)">
                <div class="canvas-box" id="canvasBox">
                    <video id="videoEl" playsinline></video>
                    <canvas id="poseCanvas"></canvas>
                </div>
                <div id="annotInstr" style="margin-top:10px; color: var(--tf-blue);">Carga un video para comenzar.</div>
            </div>
        </section>
        
        <section id="page-calc" class="page">
            <h2>Calculadora Manual</h2>
            <div class="card">Cálculos rápidos REBA/RULA.</div>
        </section>
    </main>
</div>

<script>
/** * ERGONÓMICO V2 - SCRIPT CORREGIDO
 * 1. Definición única de variables globales.
 * 2. Funciones asignadas a 'window' para evitar errores de scope.
 * 3. Lógica de coordenadas de ratón corregida.
 */

// --- ESTADO GLOBAL ---
const APP = {
    evaluations: JSON.parse(localStorage.getItem('ergonom_evals') || '[]'),
    apiKey: sessionStorage.getItem('ergonom_api_key') || '',
    points: {},
    activeJoint: 'cuello' // Ejemplo de primer punto
};

// --- NODOS DE UI (Declarados una sola vez para evitar SyntaxError) ---
let videoEl, canvas, ctx;
let isRenderLoopActive = false;

// --- NAVEGACIÓN ---
window.goPage = function(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    
    document.getElementById('page-' + id).classList.add('active');
    // Marcar item de menú (simplificado)
    event.currentTarget.classList.add('active');
};

// --- GESTIÓN DE API KEY ---
window.saveApiKey = function(val) {
    if (val.startsWith('sk-ant-')) {
        sessionStorage.setItem('ergonom_api_key', val);
        APP.apiKey = val;
    }
};

// --- MOTOR DE VIDEO ---
window.loadVideo = function(event) {
    const file = event.target.files[0];
    if (!file) return;

    videoEl = document.getElementById('videoEl');
    canvas = document.getElementById('poseCanvas');
    ctx = canvas.getContext('2d');

    videoEl.src = URL.createObjectURL(file);
    videoEl.onloadedmetadata = () => {
        canvas.width = videoEl.videoWidth;
        canvas.height = videoEl.videoHeight;
        document.getElementById('annotInstr').textContent = "Video cargado. Haz clic en las articulaciones.";
        startRenderLoop();
    };

    // Evento de clic corregido para coordenadas exactas
    canvas.onclick = function(e) {
        const rect = canvas.getBoundingClientRect();
        // Escalar coordenadas si el video se ve más pequeño que su tamaño real
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        
        const x = (e.clientX - rect.left) * scaleX;
        const y = (e.clientY - rect.top) * scaleY;

        APP.points[APP.activeJoint] = { x, y };
        console.log("Punto guardado en:", x, y);
    };
};

function startRenderLoop() {
    if (isRenderLoopActive) return;
    isRenderLoopActive = true;
    
    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Dibujar puntos guardados
        for (let j in APP.points) {
            const p = APP.points[j];
            ctx.beginPath();
            ctx.arc(p.x, p.y, 8, 0, Math.PI * 2);
            ctx.fillStyle = "#D32F2F";
            ctx.fill();
            ctx.strokeStyle = "white";
            ctx.stroke();
        }
        
        requestAnimationFrame(render);
    }
    render();
}

// --- INTELIGENCIA ARTIFICIAL ---
window.analyzeWithAI = async function() {
    const task = document.getElementById('desc-task').value;
    if (!APP.apiKey) {
        alert("Por favor ingresa tu API Key de Anthropic.");
        return;
    }
    alert("Analizando tarea: " + task + " (Conectando con Claude...)");
    // Aquí iría el fetch a Anthropic
};

// Inicialización
document.addEventListener('DOMContentLoaded', () => {
    console.log("ErgoNOM v2 listo.");
});
</script>

</body>
</html>
